version: "3.8"

services:
    app:
        build: .
        container_name: study_hint_app
        volumes:
            - .:/var/www/html
        depends_on:
            - db

    nginx:
        image: nginx:latest
        container_name: study_hint_nginx
        ports:
            - "8001:80"
        volumes:
            - .:/var/www/html
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    db:
        image: mysql:8.0
        container_name: study_hint_db
        ports:
            - "3307:3306"
        environment:
            MYSQL_DATABASE: study_hint_db
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - db_data:/var/lib/mysql

volumes:
    db_data:
